<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Notices</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .menu-btns { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        button { 
            padding: 20px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 12px; transition: 0.3s; color: white; font-weight: bold;
        }
        .cam-btn { background-color: #007bff; }
        .text-btn { background-color: #6c757d; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 20px; display: none; }
        textarea { width: 100%; height: 150px; margin-top: 20px; display: none; border-radius: 10px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Que voulez-vous faire ?</h2>
        
        <div class="menu-btns">
            <button class="cam-btn" id="openCam">📸 Ouvrir la caméra arrière</button>
            <button class="text-btn" id="openText">✍️ Écrire un texte</button>
        </div>

        <video id="videoRender" autoplay playsinline></video>
        <textarea id="textInput" placeholder="Tapez votre notice ici..."></textarea>
    </div>

    <script>
        const camBtn = document.getElementById('openCam');
        const textBtn = document.getElementById('openText');
        const video = document.getElementById('videoRender');
        const textArea = document.getElementById('textInput');

        camBtn.addEventListener('click', async () => {
            textArea.style.display = "none";
            video.style.display = "block";
            try {
                // Ici on force la caméra arrière avec "environment"
                const constraints = { 
                    video: { facingMode: { exact: "environment" } } 
                };
                
                // Si l'iPhone bloque l'accès "exact", on essaie une méthode plus souple
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (e) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                }
                
                video.srcObject = stream;
            } catch (err) {
                alert("Erreur : Impossible d'accéder à la caméra arrière.");
            }
        });

        textBtn.addEventListener('click', () => {
            video.style.display = "none";
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            textArea.style.display = "block";
            textArea.focus();
        });
    </script>

</body>
</html>
