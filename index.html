<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="" content="width=device-width, initial-scale=1.0">
    <title>Mes Notices PDF</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .section { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        video { width: 100%; border-radius: 10px; border: 2px solid #3498db; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin: 10px 0; font-size: 16px; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-search { background: #27ae60; }
        #history { text-align: left; margin-top: 20px; }
        .history-item { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .history-item a { color: #3498db; text-decoration: none; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
        .delete-btn { color: #e74c3c; font-weight: bold; padding: 5px 10px; }
    </style>
</head>
<body>

    <h2>Scan & Save Notice</h2>

    <div class="section">
        <video id="video" autoplay playsinline></video>
        <button onclick="captureAndScan()">SCANNER L'ÉTIQUETTE</button>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="section">
        <input type="text" id="manualInput" placeholder="Nom de l'appareil...">
        <button class="btn-search" onclick="handleSearch()">RECHERCHER PDF</button>
    </div>

    <div id="history">
        <h3>📚 Ma Bibliothèque</h3>
        <div id="historyList"></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
    const video = document.getElementById('video');
    const manualInput = document.getElementById('manualInput');
    const historyList = document.getElementById('historyList');

    // Démarrer caméra
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);

    // Charger l'historique au démarrage
    window.onload = displayHistory;

    function handleSearch() {
        const name = manualInput.value.trim();
        if (name) {
            saveToHistory(name);
            const query = encodeURIComponent("notice manuel d'utilisation " + name + " filetype:pdf");
            window.open("https://www.google.com/search?q=" + query);
        }
    }

    function captureAndScan() {
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        document.getElementById('manualInput').value = "Scan en cours...";
        
        Tesseract.recognize(canvas, 'fra').then(({ data: { text } }) => {
            const result = text.trim();
            manualInput.value = result;
            if (result.length > 3) handleSearch();
        });
    }

    function saveToHistory(name) {
        let history = JSON.parse(localStorage.getItem('notices') || '[]');
        if (!history.includes(name)) {
            history.push(name);
            localStorage.setItem('notices', JSON.stringify(history));
            displayHistory();
        }
    }

    function displayHistory() {
        let history = JSON.parse(localStorage.getItem('notices') || '[]');
        historyList.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <a href="https://www.google.com/search?q=notice+pdf+${encodeURIComponent(item)}" target="_blank">📄 ${item}</a>
                <span class="delete-btn" onclick="deleteItem(${index})">✕</span>
            </div>
        `).join('');
    }

    function deleteItem(index) {
        let history = JSON.parse(localStorage.getItem('notices') || '[]');
        history.splice(index, 1);
        localStorage.setItem('notices', JSON.stringify(history));
        displayHistory();
    }
</script>
</body>
</html>
